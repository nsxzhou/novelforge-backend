services:
  postgres:
    image: postgres:16-alpine
    container_name: novelforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: novelforge
      POSTGRES_USER: novelforge
      POSTGRES_PASSWORD: novelforge
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novelforge -d novelforge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
